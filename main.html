<script>
	function secondHighest(arr) {
		if (!arr || arr.length < 2) {
			return -Infinity;
		}

		let first = -Infinity;
		let second = -Infinity;

		for (let num of arr) {
			num = Number(num); //

			if (num > first) {
				second = first;
				first = num;
			} else if (num > second && num < first) {
				second = num;
			}
		}

		return second;
	}

	function Main() {
		var n = prompt("Enter the number of elements");
		var arr = [];

		for (var i = 0; i < n; i++) {
			arr[i] = Number(prompt("Enter element " + (i+1))); // ✅ convert here also
		}

		alert(secondHighest(arr));
	}

	Main();
</script>
